---
- name: Install coturn
  apt:
    name: coturn
    state: present
    update_cache: yes

- name: Enable coturn service (set TURNSERVER_ENABLED=1)
  lineinfile:
    path: /etc/default/coturn
    regexp: '^#?TURNSERVER_ENABLED'
    line: 'TURNSERVER_ENABLED=1'
    state: present

- name: Deploy turnserver.conf
  template:
    src: turnserver.conf.j2
    dest: /etc/turnserver.conf
    owner: root
    group: turnserver
    mode: "0640"
  notify: Restart coturn

- name: Ensure log directory exists with correct ownership
  file:
    path: /var/log/turnserver
    state: directory
    owner: turnserver
    group: turnserver
    mode: "0755"

- name: Enable and start coturn
  service:
    name: coturn
    state: started
    enabled: yes
